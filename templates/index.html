<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Premium Bot Dashboard</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0e17;
            color: #e4e8ef;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { 
            font-size: 2rem; 
            background: linear-gradient(135deg, #f0b34b, #f7d875);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: #141a23;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a3344;
        }
        .card h3 {
            color: #f0b34b;
            margin-bottom: 15px;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #1a2434;
            border: 1px solid #2f3b52;
            color: #e4e8ef;
            border-radius: 8px;
        }
        button {
            background: linear-gradient(135deg, #f0b34b, #e09d3a);
            color: #0a0e17;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { transform: scale(1.02); }
        button.danger { background: #e74c3c; color: white; }
        .logs {
            background: #0a0e17;
            border-radius: 8px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            border: 1px solid #1e283b;
        }
        .log-entry { padding: 2px 0; }
        .log-entry.success { color: #2ecc71; }
        .log-entry.error { color: #e74c3c; }
        .log-entry.info { color: #f0b34b; }
        .status { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; }
        .status.live { background: #2ecc71; color: #0a0e17; }
        .status.dead { background: #e74c3c; color: white; }
        .status.pending { background: #f0b34b; color: #0a0e17; }
        .success-list {
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.85rem;
        }
        .success-item {
            padding: 5px;
            border-bottom: 1px solid #1e283b;
            display: flex;
            justify-content: space-between;
        }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; }
        .flex input { flex: 1; }
        .flex button { flex: 0 0 auto; width: auto; padding: 10px 20px; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
        }
        .badge.success { background: #2ecc71; color: #0a0e17; }
        .badge.error { background: #e74c3c; color: white; }
        .badge.info { background: #3498db; color: white; }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ Auto Premium Bot Dashboard</h1>

    <div class="grid">
        <!-- Proxies -->
        <div class="card">
            <h3>🌐 Proxies</h3>
            <div class="flex">
                <input type="text" id="proxyInput" placeholder="http://proxy:port">
                <input type="text" id="proxyCountry" placeholder="Country" style="flex:0.5">
            </div>
            <button onclick="addProxy()">Add Proxy</button>
            <button onclick="checkProxies()" class="danger" style="margin-top:5px;">Check All Proxies</button>
            <div id="proxyList" style="max-height:200px;overflow-y:auto;margin-top:10px;"></div>
        </div>

        <!-- Sites -->
        <div class="card">
            <h3>📡 Sites</h3>
            <input type="text" id="siteName" placeholder="Site Name">
            <input type="text" id="siteUrl" placeholder="https://example.com/signup">
            <input type="text" id="sitePlan" placeholder="Plan Name (optional)">
            <input type="text" id="siteCode" placeholder="Code (optional)">
            <button onclick="addSite()">Add Site</button>
            <div id="siteList" style="max-height:200px;overflow-y:auto;margin-top:10px;"></div>
        </div>

        <!-- BINs -->
        <div class="card">
            <h3>💳 BINs</h3>
            <input type="text" id="binInput" placeholder="Card BIN (e.g., 2842770951889894)">
            <input type="text" id="binLabel" placeholder="Label (optional)">
            <button onclick="addBin()">Add BIN</button>
            <div id="binList" style="max-height:200px;overflow-y:auto;margin-top:10px;"></div>
        </div>
    </div>

    <!-- Control Panel -->
    <div class="card">
        <h3>🎮 Control Panel</h3>
        <div class="flex">
            <select id="siteSelect" style="flex:1;"></select>
            <select id="proxySelect" style="flex:1;"></select>
            <select id="binSelect" style="flex:1;"></select>
            <button onclick="startAutomation()" id="startBtn">▶ Start</button>
            <button onclick="stopAutomation()" id="stopBtn" class="danger">⏹ Stop</button>
        </div>
        <div style="margin-top:10px;">
            <span id="statusText" style="color:#f0b34b;">⏸ Idle</span>
        </div>
    </div>

    <!-- Live Logs -->
    <div class="card">
        <h3>📋 Live Logs</h3>
        <div class="logs" id="logContainer"></div>
    </div>

    <!-- Success Hits -->
    <div class="card">
        <h3>✅ Successful Hits</h3>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <button onclick="exportSuccess()">📥 Export CSV</button>
            <button onclick="clearSuccess()" class="danger">🗑 Clear</button>
        </div>
        <div class="success-list" id="successList"></div>
    </div>

    <!-- Lemur API -->
    <div class="card">
        <h3>🦎 Lemur API Keys (Share yours)</h3>
        <div class="flex">
            <input type="text" id="lemurKey" placeholder="Your Lemur API Key">
            <input type="text" id="lemurUser" placeholder="Your Username/ID">
        </div>
        <button onclick="addLemurKey()">Submit Lemur API Key</button>
        <div id="lemurList" style="max-height:100px;overflow-y:auto;margin-top:10px;font-size:0.8rem;color:#8896b0;"></div>
    </div>
</div>

<script>
    const socket = io();
    let selectedSite = null, selectedProxy = null, selectedBin = null;

    // ======= SOCKET EVENTS =======
    socket.on('connect', () => console.log('Connected to server'));
    socket.on('log', (data) => addLog(data.message, data.type));
    socket.on('success', (data) => addSuccess(data));

    // ======= PROXIES =======
    async function addProxy() {
        const url = document.getElementById('proxyInput').value;
        const country = document.getElementById('proxyCountry').value || 'Unknown';
        if (!url) return alert('Enter proxy URL');
        await fetch('/api/proxies', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url, country})
        });
        document.getElementById('proxyInput').value = '';
        document.getElementById('proxyCountry').value = '';
        loadProxies();
    }

    async function loadProxies() {
        const res = await fetch('/api/proxies');
        const proxies = await res.json();
        const container = document.getElementById('proxyList');
        container.innerHTML = proxies.map(p => `
            <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1e283b;">
                <span>${p.url}</span>
                <span class="status ${p.status || 'pending'}">${p.status || 'pending'}</span>
            </div>
        `).join('');
        updateSelects();
    }

    async function checkProxies() {
        await fetch('/api/proxies/check', {method: 'POST'});
        loadProxies();
    }

    // ======= SITES =======
    async function addSite() {
        const name = document.getElementById('siteName').value;
        const url = document.getElementById('siteUrl').value;
        const plan = document.getElementById('sitePlan').value;
        const code = document.getElementById('siteCode').value;
        if (!name || !url) return alert('Enter site name and URL');
        await fetch('/api/sites', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, url, plan, code})
        });
        document.getElementById('siteName').value = '';
        document.getElementById('siteUrl').value = '';
        document.getElementById('sitePlan').value = '';
        document.getElementById('siteCode').value = '';
        loadSites();
    }

    async function loadSites() {
        const res = await fetch('/api/sites');
        const sites = await res.json();
        const container = document.getElementById('siteList');
        container.innerHTML = sites.map(s => `
            <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1e283b;">
                <span>${s.name}</span>
                <span style="font-size:0.7rem;color:#8896b0;">${s.plan || 'Free'}</span>
            </div>
        `).join('');
        updateSelects();
    }

    // ======= BINS =======
    async function addBin() {
        const bin = document.getElementById('binInput').value;
        const label = document.getElementById('binLabel').value;
        if (!bin) return alert('Enter BIN');
        await fetch('/api/bins', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({bin, label})
        });
        document.getElementById('binInput').value = '';
        document.getElementById('binLabel').value = '';
        loadBins();
    }

    async function loadBins() {
        const res = await fetch('/api/bins');
        const bins = await res.json();
        const container = document.getElementById('binList');
        container.innerHTML = bins.map(b => `
            <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1e283b;">
                <span>${b.bin}</span>
                <span style="font-size:0.7rem;color:#8896b0;">${b.label || ''}</span>
            </div>
        `).join('');
        updateSelects();
    }

    // ======= SELECT UPDATES =======
    async function updateSelects() {
        const sites = await (await fetch('/api/sites')).json();
        const proxies = await (await fetch('/api/proxies')).json();
        const bins = await (await fetch('/api/bins')).json();

        const siteSelect = document.getElementById('siteSelect');
        siteSelect.innerHTML = sites.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

        const proxySelect = document.getElementById('proxySelect');
        const liveProxies = proxies.filter(p => p.status === 'live');
        proxySelect.innerHTML = (liveProxies.length ? liveProxies : proxies).map(p => 
            `<option value="${p.id}">${p.url} ${p.status === 'live' ? '✅' : ''}</option>`
        ).join('');

        const binSelect = document.getElementById('binSelect');
        binSelect.innerHTML = bins.map(b => `<option value="${b.id}">${b.bin}</option>`).join('');
    }

    // ======= AUTOMATION CONTROLS =======
    async function startAutomation() {
        const siteId = document.getElementById('siteSelect').value;
        const proxyId = document.getElementById('proxySelect').value;
        const binId = document.getElementById('binSelect').value;
        if (!siteId || !proxyId || !binId) return alert('Select all options');

        document.getElementById('startBtn').disabled = true;
        document.getElementById('statusText').innerHTML = '🔄 Running...';
        
        await fetch('/api/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({site_id: parseInt(siteId), proxy_id: parseInt(proxyId), bin_id: parseInt(binId)})
        });
    }

    async function stopAutomation() {
        await fetch('/api/stop', {method: 'POST'});
        document.getElementById('startBtn').disabled = false;
        document.getElementById('statusText').innerHTML = '⏸ Stopped';
    }

    // ======= LOGS =======
    function addLog(message, type = 'info') {
        const container = document.getElementById('logContainer');
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        container.appendChild(entry);
        container.scrollTop = container.scrollHeight;
    }

    // ======= SUCCESS =======
    function addSuccess(data) {
        const container = document.getElementById('successList');
        const item = document.createElement('div');
        item.className = 'success-item';
        item.innerHTML = `
            <span>${data.site}</span>
            <span>${data.email}</span>
            <span class="badge success">${data.plan}</span>
        `;
        container.prepend(item);
        if (container.children.length > 100) container.removeChild(container.lastChild);
    }

    async function loadSuccess() {
        const res = await fetch('/api/success');
        const data = await res.json();
        const container = document.getElementById('successList');
        container.innerHTML = data.slice(0, 50).map(row => `
            <div class="success-item">
                <span>${row[1] || 'N/A'}</span>
                <span>${row[2] || 'N/A'}</span>
                <span class="badge success">${row[4] || 'Free'}</span>
            </div>
        `).join('');
    }

    async function exportSuccess() {
        window.open('/api/success/export', '_blank');
    }

    async function clearSuccess() {
        if (confirm('Clear all success records?')) {
            await fetch('/api/success/clear', {method: 'POST'});
            document.getElementById('successList').innerHTML = '';
        }
    }

    // ======= LEMUR API =======
    async function addLemurKey() {
        const key = document.getElementById('lemurKey').value;
        const user = document.getElementById('lemurUser').value;
        if (!key) return alert('Enter Lemur API key');
        await fetch('/api/lemur', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({key, user, timestamp: new Date().toISOString()})
        });
        document.getElementById('lemurKey').value = '';
        document.getElementById('lemurUser').value = '';
        alert('✅ Lemur API key submitted successfully!');
        loadLemurKeys();
    }

    async function loadLemurKeys() {
        try {
            const res = await fetch('/api/lemur');
            const keys = await res.json();
            const container = document.getElementById('lemurList');
            container.innerHTML = keys.slice(-5).map(k => 
                `<div>🦎 ${k.user || 'Anonymous'} - ${k.key.slice(0,8)}... (${new Date(k.timestamp).toLocaleDateString()})</div>`
            ).join('');
        } catch(e) {}
    }

    // ======= INIT =======
    loadProxies();
    loadSites();
    loadBins();
    loadSuccess();
    loadLemurKeys();
</script>
</body>
  </html>
